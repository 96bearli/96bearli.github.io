  <h1 class="title" itemprop="name">Errors were encountered while processing的解决办法</h1>
  <div class="entry-content" itemprop="articleBody">
    
    <p>sudo apt-get upgrade报错</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">3 not fully installed or removed.</span><br></pre></td></tr></table></figure>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span><span class="bash">解决方法</span></span><br><span class="line">cd /var/lib/dpkg</span><br><span class="line">sudo mv info info.bak</span><br><span class="line">sudo mkdir info</span><br><span class="line">sudo apt-get upgrade</span><br></pre></td></tr></table></figure>
<p>完美解决！</p>
